{% extends 'immobilier/base.html' %}
{% block title %}Évaluer — {{ property.title }}{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="fw-bold mb-1"><i class="fas fa-star text-warning me-2"></i>Évaluer</h3>
        <p class="text-muted mb-4">{{ property.title }}</p>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Note</label>
            {{ form.rating }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Commentaire</label>
            {{ form.comment }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Enregistrer l'évaluation</button>
            <a href="{% url 'immobilier:property_detail' property.pk %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
